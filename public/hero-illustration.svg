<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEF9EC"/>
      <stop offset="100%" stop-color="#FDF3D0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5CC5A"/>
      <stop offset="100%" stop-color="#C49A2E"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#sky)"/>

  <!-- Soft sun rays -->
  <g opacity="0.12">
    <line x1="450" y1="60" x2="100" y2="420" stroke="#E8B847" stroke-width="60"/>
    <line x1="450" y1="60" x2="280" y2="500" stroke="#E8B847" stroke-width="60"/>
    <line x1="450" y1="60" x2="620" y2="500" stroke="#E8B847" stroke-width="60"/>
    <line x1="450" y1="60" x2="800" y2="420" stroke="#E8B847" stroke-width="60"/>
  </g>

  <!-- Ground -->
  <ellipse cx="450" cy="480" rx="420" ry="40" fill="#E8B847" opacity="0.15"/>
  <rect x="0" y="460" width="900" height="40" fill="#E8B847" opacity="0.1"/>

  <!-- ── CHURCH BUILDING (center) ── -->
  <!-- Main building body -->
  <rect x="330" y="220" width="240" height="240" rx="4" fill="url(#buildingGrad)" filter="url(#shadow)"/>
  <!-- Roof / gable -->
  <polygon points="310,220 450,120 590,220" fill="white" filter="url(#shadow)"/>
  <polygon points="320,220 450,130 580,220" fill="#F5F0E8"/>
  <!-- Steeple base -->
  <rect x="424" y="80" width="52" height="60" rx="2" fill="white"/>
  <!-- Steeple spire -->
  <polygon points="420,82 450,18 480,82" fill="url(#goldGrad)"/>

  <!-- Cross on steeple -->
  <rect x="444" y="28" width="12" height="36" rx="2" fill="white"/>
  <rect x="434" y="38" width="32" height="10" rx="2" fill="white"/>

  <!-- Church door (arched) -->
  <path d="M418 460 L418 360 Q450 330 482 360 L482 460 Z" fill="#E8B847" opacity="0.25"/>
  <path d="M424 460 L424 363 Q450 338 476 363 L476 460 Z" fill="#C49A2E" opacity="0.35"/>
  <!-- Door handle -->
  <circle cx="458" cy="415" r="3" fill="#C49A2E"/>

  <!-- Windows (arched) -->
  <!-- Left window -->
  <path d="M352 320 L352 290 Q368 275 384 290 L384 320 Z" fill="#FEF9EC" stroke="#E8B847" stroke-width="2"/>
  <line x1="368" y1="275" x2="368" y2="320" stroke="#E8B847" stroke-width="1.5"/>
  <line x1="352" y1="298" x2="384" y2="298" stroke="#E8B847" stroke-width="1.5"/>
  <!-- Right window -->
  <path d="M516 320 L516 290 Q532 275 548 290 L548 320 Z" fill="#FEF9EC" stroke="#E8B847" stroke-width="2"/>
  <line x1="532" y1="275" x2="532" y2="320" stroke="#E8B847" stroke-width="1.5"/>
  <line x1="516" y1="298" x2="548" y2="298" stroke="#E8B847" stroke-width="1.5"/>

  <!-- Rose window above door -->
  <circle cx="450" cy="245" r="22" fill="#FEF9EC" stroke="#E8B847" stroke-width="2"/>
  <circle cx="450" cy="245" r="8" fill="#E8B847" opacity="0.4"/>
  <line x1="450" y1="223" x2="450" y2="267" stroke="#E8B847" stroke-width="1.5"/>
  <line x1="428" y1="245" x2="472" y2="245" stroke="#E8B847" stroke-width="1.5"/>
  <line x1="434" y1="229" x2="466" y2="261" stroke="#E8B847" stroke-width="1.5" opacity="0.6"/>
  <line x1="466" y1="229" x2="434" y2="261" stroke="#E8B847" stroke-width="1.5" opacity="0.6"/>

  <!-- Steps -->
  <rect x="400" y="455" width="100" height="8" rx="2" fill="#E8D89A"/>
  <rect x="408" y="448" width="84" height="8" rx="2" fill="#EFE4AE"/>

  <!-- ── LEFT SIDE: Check-in kiosk / tablet ── -->
  <g filter="url(#shadow)">
    <rect x="100" y="260" width="140" height="180" rx="12" fill="white"/>
    <!-- Screen bezel -->
    <rect x="110" y="272" width="120" height="140" rx="6" fill="#1a1a2e"/>
    <!-- Screen content (check-in UI) -->
    <rect x="116" y="278" width="108" height="128" rx="4" fill="#0f172a"/>
    <!-- Header bar -->
    <rect x="116" y="278" width="108" height="22" rx="4" fill="#E8B847"/>
    <rect x="116" y="290" width="108" height="10" fill="#E8B847"/>
    <!-- Logo mark on header -->
    <text x="170" y="294" font-family="sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">CHECK IN</text>
    <!-- Name fields -->
    <rect x="122" y="308" width="96" height="12" rx="3" fill="#1e293b"/>
    <text x="126" y="318" font-family="sans-serif" font-size="7" fill="#94a3b8">First Name</text>
    <rect x="122" y="326" width="96" height="12" rx="3" fill="#1e293b"/>
    <text x="126" y="336" font-family="sans-serif" font-size="7" fill="#94a3b8">Last Name</text>
    <!-- Search button -->
    <rect x="134" y="344" width="72" height="14" rx="7" fill="#E8B847"/>
    <text x="170" y="354" font-family="sans-serif" font-size="7" font-weight="bold" fill="white" text-anchor="middle">Search</text>
    <!-- Success state -->
    <rect x="122" y="364" width="96" height="30" rx="4" fill="#064e3b" opacity="0.8"/>
    <text x="170" y="376" font-family="sans-serif" font-size="7" fill="#6ee7b7" text-anchor="middle">✓ Checked In</text>
    <text x="170" y="387" font-family="sans-serif" font-size="6" fill="#94a3b8" text-anchor="middle">Room 3 · Blue Team</text>
    <!-- Stand -->
    <rect x="158" y="440" width="24" height="8" rx="2" fill="#d1d5db"/>
    <rect x="148" y="446" width="44" height="6" rx="3" fill="#9ca3af"/>
  </g>

  <!-- ── RIGHT SIDE: Report / dashboard card ── -->
  <g filter="url(#shadow)">
    <rect x="660" y="240" width="170" height="200" rx="12" fill="white"/>
    <!-- Card header -->
    <rect x="660" y="240" width="170" height="38" rx="12" fill="#E8B847"/>
    <rect x="660" y="258" width="170" height="20" fill="#E8B847"/>
    <text x="745" y="265" font-family="sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Attendance Report</text>

    <!-- Stat rows -->
    <text x="676" y="296" font-family="sans-serif" font-size="9" fill="#6b7280">Total Students</text>
    <text x="820" y="296" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f2937" text-anchor="end">248</text>
    <line x1="676" y1="302" x2="820" y2="302" stroke="#f3f4f6" stroke-width="1"/>

    <text x="676" y="320" font-family="sans-serif" font-size="9" fill="#6b7280">Present Today</text>
    <text x="820" y="320" font-family="sans-serif" font-size="11" font-weight="bold" fill="#059669" text-anchor="end">211</text>
    <line x1="676" y1="326" x2="820" y2="326" stroke="#f3f4f6" stroke-width="1"/>

    <text x="676" y="344" font-family="sans-serif" font-size="9" fill="#6b7280">Volunteers</text>
    <text x="820" y="344" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1f2937" text-anchor="end">34</text>
    <line x1="676" y1="350" x2="820" y2="350" stroke="#f3f4f6" stroke-width="1"/>

    <!-- Mini bar chart -->
    <text x="676" y="368" font-family="sans-serif" font-size="8" fill="#9ca3af">This Week</text>
    <!-- Bars -->
    <rect x="676" y="400" width="18" height="20" rx="2" fill="#E8B847" opacity="0.4"/>
    <text x="685" y="426" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">M</text>
    <rect x="700" y="388" width="18" height="32" rx="2" fill="#E8B847" opacity="0.6"/>
    <text x="709" y="426" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">T</text>
    <rect x="724" y="382" width="18" height="38" rx="2" fill="#E8B847" opacity="0.8"/>
    <text x="733" y="426" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">W</text>
    <rect x="748" y="375" width="18" height="45" rx="2" fill="#E8B847"/>
    <text x="757" y="426" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">T</text>
    <rect x="772" y="380" width="18" height="40" rx="2" fill="#C49A2E"/>
    <text x="781" y="426" font-family="sans-serif" font-size="7" fill="#9ca3af" text-anchor="middle">F</text>
    <!-- Chart baseline -->
    <line x1="676" y1="420" x2="800" y2="420" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- ── Floating badge card (student ID) ── -->
  <g filter="url(#shadow)" transform="rotate(-6, 210, 180)">
    <rect x="140" y="110" width="110" height="140" rx="10" fill="white"/>
    <rect x="140" y="110" width="110" height="36" rx="10" fill="#E8B847"/>
    <rect x="140" y="130" width="110" height="16" fill="#E8B847"/>
    <text x="195" y="133" font-family="sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">STEWARD VBS</text>
    <!-- Avatar circle -->
    <circle cx="195" cy="178" r="22" fill="#FEF9EC" stroke="#E8B847" stroke-width="2"/>
    <circle cx="195" cy="172" r="10" fill="#E8B847" opacity="0.5"/>
    <ellipse cx="195" cy="196" rx="16" ry="8" fill="#E8B847" opacity="0.3"/>
    <!-- Name lines -->
    <rect x="158" y="208" width="74" height="7" rx="3" fill="#e5e7eb"/>
    <rect x="170" y="220" width="50" height="6" rx="3" fill="#f3f4f6"/>
    <!-- Lanyard hole -->
    <circle cx="195" cy="110" r="5" fill="#d1d5db"/>
    <rect x="193" y="104" width="4" height="10" rx="1" fill="#9ca3af"/>
  </g>

  <!-- ── Stars / sparkles ── -->
  <g fill="#E8B847">
    <path d="M80 80 L83 90 L93 90 L85 96 L88 106 L80 100 L72 106 L75 96 L67 90 L77 90 Z" opacity="0.4" transform="scale(0.6) translate(60,60)"/>
    <path d="M820 120 L822 128 L830 128 L824 133 L826 141 L820 136 L814 141 L816 133 L810 128 L818 128 Z" opacity="0.5"/>
    <circle cx="620" cy="80" r="4" opacity="0.35"/>
    <circle cx="640" cy="100" r="2.5" opacity="0.25"/>
    <circle cx="600" cy="95" r="3" opacity="0.3"/>
    <circle cx="260" cy="70" r="3.5" opacity="0.3"/>
    <circle cx="280" cy="88" r="2" opacity="0.2"/>
  </g>

  <!-- ── Logo wordmark at bottom center ── -->
  <text x="450" y="492" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#C49A2E" text-anchor="middle" opacity="0.6" letter-spacing="2">STEWARD VBS</text>
</svg>
