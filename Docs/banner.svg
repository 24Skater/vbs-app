<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dot grid pattern -->
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="300" fill="url(#bgGrad)"/>
  <!-- Dot grid overlay -->
  <rect width="1280" height="300" fill="url(#dots)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="150" rx="300" ry="200" fill="rgba(59,130,246,0.08)"/>
  <ellipse cx="1080" cy="150" rx="280" ry="180" fill="rgba(99,102,241,0.08)"/>

  <!-- Large decorative cross — far right -->
  <g transform="translate(1160, 150)" opacity="0.12">
    <rect x="-10" y="-90" width="20" height="180" rx="6" fill="white"/>
    <rect x="-90" y="-10" width="180" height="20" rx="6" fill="white"/>
  </g>

  <!-- Small decorative cross — far left -->
  <g transform="translate(120, 80)" opacity="0.1">
    <rect x="-5" y="-40" width="10" height="80" rx="4" fill="white"/>
    <rect x="-40" y="-5" width="80" height="10" rx="4" fill="white"/>
  </g>

  <!-- Center cross icon with glow -->
  <g transform="translate(640, 90)" filter="url(#softglow)">
    <rect x="-7" y="-42" width="14" height="84" rx="5" fill="url(#crossGrad)" opacity="0.95"/>
    <rect x="-42" y="-7" width="84" height="14" rx="5" fill="url(#crossGrad)" opacity="0.95"/>
  </g>

  <!-- Main wordmark -->
  <text
    x="640"
    y="185"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="78"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-3"
    filter="url(#glow)"
  >VBS App</text>

  <!-- Tagline -->
  <text
    x="640"
    y="225"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="rgba(148,163,184,1)"
    text-anchor="middle"
    letter-spacing="0.5"
  >Free, self-hosted Vacation Bible School management for churches</text>

  <!-- Accent line -->
  <rect x="560" y="255" width="160" height="2" rx="1" fill="rgba(59,130,246,0.6)"/>

  <!-- Version pill -->
  <rect x="590" y="265" width="100" height="24" rx="12" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text
    x="640"
    y="281"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="12"
    font-weight="500"
    fill="rgba(147,197,253,1)"
    text-anchor="middle"
    letter-spacing="1"
  >OPEN SOURCE · MIT</text>
</svg>
